<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click For Run Prototype</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="menu">
    <h1>CLICK RUNNER</h1>
    <p>Duración actual: 10 segundos</p>
    <button onclick="startTest()">Comenzar</button>
</div>

<div id="game">
    <div id="timer">10</div>
    <div id="clickArea"></div>
</div>

<div id="result" style="display:none;">
    <h1>Resultado</h1>
    <h2 id="cpsText"></h2>
    <h3 id="styleText"></h3>

```
<canvas id="canvas" width="600" height="300"></canvas>

<br>
<button onclick="location.reload()">Reintentar</button>
```

</div>

<script>

const TEST_DURATION = 10;

let clicks = [];
let startTime = 0;
let running = false;

const clickArea = document.getElementById("clickArea");

function startTest(){

    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    clicks = [];
    running = true;

    startTime = performance.now();

    let timeLeft = TEST_DURATION;

    document.getElementById("timer").textContent=timeLeft;

    const countdown = setInterval(()=>{

        timeLeft--;

        document.getElementById("timer").textContent=timeLeft;

        if(timeLeft<=0){
            clearInterval(countdown);
            finishTest();
        }

    },1000);
}

clickArea.addEventListener("click",(e)=>{

    if(!running) return;

    const now = performance.now();

    clicks.push(now - startTime);
});

function finishTest(){

    running = false;

    document.getElementById("game").style.display="none";
    document.getElementById("result").style.display="block";

    const cps = (clicks.length / TEST_DURATION).toFixed(2);

    document.getElementById("cpsText").textContent =
        "CPS: " + cps;

    let style = "";

    if(cps < 4){
        style = "Caminante";
    }
    else if(cps < 7){
        style = "Trotador";
    }
    else if(cps < 10){
        style = "Corredor";
    }
    else{
        style = "Hiperactivo";
    }

    document.getElementById("styleText").textContent =
        "Estilo: " + style;

    animateReplay(cps);
}

function animateReplay(cps){

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let x = 50;
    let phase = 0;

    function drawStickman(){

        ctx.clearRect(0,0,canvas.width,canvas.height);

        const y = 180;

        ctx.strokeStyle="white";
        ctx.lineWidth=3;

        const swing = Math.sin(phase) * 15;

        // cabeza
        ctx.beginPath();
        ctx.arc(x,y-60,15,0,Math.PI*2);
        ctx.stroke();

        // cuerpo
        ctx.beginPath();
        ctx.moveTo(x,y-45);
        ctx.lineTo(x,y);
        ctx.stroke();

        // brazos
        ctx.beginPath();
        ctx.moveTo(x,y-30);
        ctx.lineTo(x+swing,y-10);

        ctx.moveTo(x,y-30);
        ctx.lineTo(x-swing,y-10);
        ctx.stroke();

        // piernas
        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x+swing,y+25);

        ctx.moveTo(x,y);
        ctx.lineTo(x-swing,y+25);
        ctx.stroke();
    }

    function loop(){

        drawStickman();

        x += cps * 0.5;

        phase += cps * 0.05;

        if(x > canvas.width + 30){
            x = -30;
        }

        requestAnimationFrame(loop);
    }

    loop();
}

</script>

</body>
</html>
